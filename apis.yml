description: >-
  Bain & Company is a global management consulting firm and one of the
  prestigious Big Three strategy consultancies. Bain does not publish a
  commercial public developer portal; technology integration is delivered
  through client-specific advisory engagements, Bain proprietary tools
  (NPS Prism, Helix, Vector), and a Bain-published Insights / research
  surface that is consumed via the bain.com website and feeds rather than
  developer APIs.
