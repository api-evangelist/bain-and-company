  - type: Features
    data:
      - name: Bain Insights and Research
        description: Bain publishes industry reports, the Global Private Equity Report, the Technology Report, and other research available via bain.com.
      - name: NPS Prism Benchmarking
        description: NPS Prism is a Bain-built customer experience benchmarking product delivered as a SaaS service to subscribers.
      - name: Helix Operating Model
        description: Helix is Bain's organizational and operating-model diagnostic, delivered through consulting engagements.
      - name: Vector Digital Platform
        description: Vector is Bain's digital transformation accelerator, combining proprietary methodologies with partner technology.
      - name: Client Engagement Workspaces
        description: Active engagements use Bain-managed secure data rooms and analytic environments rather than public APIs.
  - type: UseCases
    data:
      - name: Strategy Advisory
        description: C-suite advisory on corporate, growth, M&A, customer, and digital strategy.
      - name: Customer Experience Benchmarking
        description: Companies benchmark customer experience and NPS performance across competitors via NPS Prism.
      - name: Private Equity Diligence
        description: Commercial due diligence, value creation planning, and exit advisory for PE sponsors and corporate buyers.
      - name: Digital and AI Transformation
        description: Operating-model redesign and AI deployment delivered jointly with Bain partners and proprietary accelerators.
  - type: Compliance
    data:
      - name: GDPR
        description: European client and personal data handling is governed by the EU General Data Protection Regulation.
      - name: SOC 2
        description: Hosted Bain digital products such as NPS Prism follow SOC 2 controls for security, availability, and confidentiality.
      - name: ISO 27001
        description: Bain's information security management system aligns with ISO 27001 controls.
      - name: Client Confidentiality
        description: All engagements operate under master consulting agreements with strict confidentiality and conflict-management terms.
